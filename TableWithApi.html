<head>

<body>
  <div id="navBar"></div>

    <h1>Table Data</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>id</th>                                                                                                                                                               
                <th>firstName</th>
                <th>lastName</th>
                <th>Email ID</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tdata">

        </tbody>
    </table>

    <div class="modal fade" id="popUpModel" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">Edit User</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
    <form id="submit">
      <div class="modal-body">
        <!-- <input type="text" id="firstName"> -->
        
         <div class="mb-3">
        <input type="text" class="form-control" id="firstName" name="firstName" placeholder="name@example.com">
         </div>
         <div class="mb-3">
         <input type="text" class="form-control" id="lastName" name="lastName" placeholder="name@example.com">
          </div>
          <div class="mb-3">
          <input type="text" class="form-control" id="email" name="email" placeholder="name@example.com">
          </div>
          <!-- <button type="submit" class="btn btn-primary">submit</button> -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-primary">submit</button>
      </div>
    </form>
    </div>
  </div>
</div>
